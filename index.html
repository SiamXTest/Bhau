  * { margin: 0; padding: 0; box-sizing: border-box; }

    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.6);
    backdrop-filter: blur(8px);
    transition: all 0.3s ease;
    white-space: nowrap;

  .btn svg {
    width: 14px; height: 14px;
    fill: currentColor;
    flex-shrink: 0;

  .btn:hover {

    border-color: rgba(255,255,255,0.3);

  .btn.tg:hover  { border-color: rgba(38,160,220,0.6); color: #4bbfe8; }
  .btn.em:hover  { border-color: rgba(220,80,60,0.6);  color: #ff6644; }

  @media (max-width: 420px) {
    .socials { gap: 8px; bottom: 24px; }
    .btn { padding: 9px 14px; font-size: 10px; gap: 6px; }
    .btn span { display: none; }
    .btn svg { width: 16px; height: 16px; }

<body>

<canvas id="c"></canvas>

<div class="content">
  <div class="name">BHAU</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Pointer tracking ───────────────────────────────────────────
const ptr = { x: 0, y: 0, px: 0, py: 0, active: false };

function startAt(x, y) {
  ptr.px = x; ptr.py = y;
  ptr.x  = x; ptr.y  = y;
  ptr.active = true;
}
function moveTo(x, y) {
  if (!ptr.active) return;
  ptr.px = ptr.x; ptr.py = ptr.y;
  ptr.x  = x;     ptr.y  = y;
  const dx = x - ptr.px;
  const dy = y - ptr.py;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 1) return;
  // Spawn multiple particles along this segment for smooth trail
  const count = Math.min(Math.ceil(dist * 0.6), 14);
  for (let i = 0; i < count; i++) {
    const t = i / count;
    spawnParticle(
      ptr.px + dx * t,
      ptr.py + dy * t,
      dx, dy
    );
  }
}
function endDrag() { ptr.active = false; }

canvas.addEventListener('mousedown',  e => startAt(e.clientX, e.clientY));
canvas.addEventListener('mousemove',  e => moveTo(e.clientX, e.clientY));
canvas.addEventListener('mouseup',    endDrag);
canvas.addEventListener('mouseleave', endDrag);
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  startAt(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  moveTo(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend',   endDrag);
canvas.addEventListener('touchcancel',endDrag);

// ── Particle pool ──────────────────────────────────────────────
const particles = [];
const MAX = 2000;

function spawnParticle(x, y, dx, dy) {
  if (particles.length >= MAX) return;

  const dragAngle = Math.atan2(dy, dx);
  // Particles spray perpendicular to drag — both sides — creating the spiral wing effect
  const side   = Math.random() < 0.5 ? 1 : -1;
  const fan    = (Math.random() * 0.7 + 0.15) * side;   // 0.15–0.85 off perpendicular
  const angle  = dragAngle + Math.PI * 0.5 * fan;
  const speed  = 0.6 + Math.random() * 2.4;

  particles.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed * 0.72,
    curl:   side * (0.012 + Math.random() * 0.04),  // curve inward = spiral
    drag:   0.985 + Math.random() * 0.01,
    life:   0,
    maxLife: 90 + Math.random() * 240,
    size:   0.5 + Math.random() * 1.8,
    hue:    Math.random() * 38,   // red→orange
  });
}

let orbAlpha = 0;

function loop() {
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = 'rgba(0,0,7,0.15)';
  ctx.fillRect(0, 0, W, H);

  orbAlpha += ptr.active ? 0.1 : -0.07;
  orbAlpha  = Math.max(0, Math.min(1, orbAlpha));

  ctx.globalCompositeOperation = 'lighter';

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life++;
    const t = p.life / p.maxLife;

    // Alpha fade in/out
    let alpha;
    if      (t < 0.08) alpha = t / 0.08;
    else if (t > 0.65) alpha = (1 - t) / 0.35;
    else               alpha = 1;

    // Curl: rotate velocity vector
    const spd   = Math.sqrt(p.vx*p.vx + p.vy*p.vy) * p.drag;
    const angle = Math.atan2(p.vy, p.vx) + p.curl;
    p.vx = Math.cos(angle) * spd;
    p.vy = Math.sin(angle) * spd;
    p.x += p.vx;
    p.y += p.vy;

    if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }

    const lum = 42 + (1 - t) * 32;
    ctx.shadowBlur  = 9;
    ctx.shadowColor = `hsla(${p.hue},100%,60%,${alpha * 0.55})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle   = `hsla(${p.hue},95%,${lum}%,${alpha})`;
    ctx.fill();
  }

  // Orb glow at pointer
  if (orbAlpha > 0) {
    const x = ptr.x, y = ptr.y, a = orbAlpha;
    const halo = ctx.createRadialGradient(x, y, 0, x, y, 55);
    halo.addColorStop(0,    `rgba(255,180,80,${0.75*a})`);
    halo.addColorStop(0.25, `rgba(255,80,20,${0.45*a})`);
    halo.addColorStop(0.7,  `rgba(160,10,0,${0.1*a})`);
    halo.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, 55, 0, Math.PI * 2);
    ctx.fillStyle = halo;
    ctx.fill();

    ctx.shadowBlur  = 22;
    ctx.shadowColor = `rgba(255,160,60,${a})`;
    ctx.beginPath();
    ctx.arc(x, y, 4.5, 0, Math.PI * 2);
    ctx.fillStyle   = `rgba(255,230,180,${a})`;
    ctx.fill();
    ctx.shadowBlur  = 0;
  }

  ctx.globalCompositeOperation = 'source-over';
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
